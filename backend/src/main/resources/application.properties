# Server Configuration
server.port=8080
spring.application.name=oracle-migration-tool

# Anthropic Claude API Configuration
# Note: do NOT store secrets in the repository. Set the API key as an environment
# variable named `ANTHROPIC_API_KEY` and reference it here, e.g.:
anthropic.secret=${ANTHROPIC_API_KEY:}
anthropic.api-url=https://api.anthropic.com/v1/messages
anthropic.model=claude-sonnet-4-5-20250929
anthropic.max-tokens=4096
